<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { padding: 20px; }</style>
  </head>
  <body>
    <div class="container-fluid">
      <h5 class="mb-3">批量匯入委員名單</h5>
      <form id="import-form">
        <div class="mb-3">
          <label class="fw-bold">1. 選擇匯入科別</label>
          <select class="form-select" name="subject" required>
            <option value="" disabled selected>請選擇...</option>
            <option value="一般">一般</option><option value="體育">體育</option>
            <option value="音樂">音樂</option><option value="美術">美術</option>
            <option value="特教">特教</option><option value="輔導">輔導</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="fw-bold">2. 設定梯次 (Batch)</label>
          <input type="number" class="form-control" name="batch" value="1" min="1" required>
        </div>
        <div class="mb-3">
          <label class="fw-bold">3. 貼上資料 (姓名 Email)</label>
          <textarea class="form-control" name="dataList" rows="8" placeholder="範例：&#10;王大明  wang@test.com" required></textarea>
        </div>
        <button type="submit" id="btn-import" class="btn btn-primary w-100">開始匯入</button>
      </form>
      <div id="status" class="mt-3 text-center" style="display:none;">處理中...</div>
    </div>
    <script>
      document.getElementById('import-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-import');
        const status = document.getElementById('status');
        btn.disabled = true; status.style.display = 'block';
        google.script.run.withSuccessHandler(function(res) {
            status.style.display = 'none'; btn.disabled = false;
            if (res.status === 'success') { alert('成功匯入 ' + res.count + ' 筆！'); google.script.host.close(); }
            else { alert('失敗：' + res.message); }
          }).processImport(this);
      });
    </script>
  </body>
</html>
